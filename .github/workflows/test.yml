name: Test

on:
  push:
    branches: [main, develop]
  pull_request:

jobs:
  test-log-parser:
    name: log-parser
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: log-parser
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: log-parser/go.mod
      - run: go test ./...
